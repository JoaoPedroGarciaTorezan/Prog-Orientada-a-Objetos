name: 🤖 Update Profile

on:
  schedule:
    - cron: "*/10 * * * *"  # todo dia à meia-noite UTC
  workflow_dispatch:

concurrency:
  group: profile-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run updater
        run: python scripts/index.py

      - name: Commit and push
        run: |
          git config user.name "JoãoPedroGarciaTorezan"
          git config user.email "jpgtorezan@gmail.com"
          git add README.md
          git diff --cached --quiet || git commit -m "🤖 auto update $(date +'%d/%m %H:%M:%S')"
          git push
