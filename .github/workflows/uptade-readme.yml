name: Update README

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md # Ignora commits feitos pelo bot no próprio README

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT }} # Token de acesso pessoal para permitir commit

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Generate and Update README
        run: |
          # Exemplo simples: adiciona data e hora ao README
          echo "# Projeto Atualizado em $(date)" > README.md
          echo "" >> README.md
          echo "Última atualização automática." >> README.md

      - name: Commit Changes
        run: |
          git add README.md
          git diff-index --quiet HEAD || git commit -m 'Update README.md automatically'
          git push origin main   
